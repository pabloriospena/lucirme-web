🔄 Empezar de nuevo
</button> </div> </div> </div> </div> </main>  <script>
    const STEPS = [
      { id: 'name', label: 'Nombre del Proyecto', placeholder: 'Ej: Automatización Triaje Urgencias', guide: '1-3 palabras. Sin jerga técnica.' },
      { id: 'appetite', label: 'Appetite (Presupuesto)', placeholder: 'Ej: 6 semanas / 1 equipo full-stack', guide: '¿Cuánto tiempo y personas apostamos?' },
      { id: 'problem', label: 'El Problema', placeholder: 'Describe el dolor operativo o estratégico...', guide: '¿Qué falla hoy? ¿Por qué ahora? ¿A quién afecta?' },
      { id: 'solution', label: 'La Solución', placeholder: 'Visión general del abordaje...', guide: '¿Cómo lo resolvemos? No entres en detalles técnicos.' },
      { id: 'rabbit_holes', label: 'Rabbit Holes (Riesgos)', placeholder: 'Ej: Integración legacy, adopción clínica...', guide: '¿Dónde podríamos atascarnos? ¿Qué desconocemos?' },
      { id: 'no_gos', label: 'No-Gos (Límites)', placeholder: 'Ej: No migraremos base de datos histórica...', guide: '¿Qué NO haremos en esta apuesta?' }
    ];

    let currentStep = 0;
    const formData = {};

    // Load from localStorage
    const saved = localStorage.getItem('saluddrive_pitch_draft');
    if (saved) {
      try { Object.assign(formData, JSON.parse(saved)); } catch(e) {}
    }

    const stepContainer = document.getElementById('step-container');
    const progressBar = document.getElementById('progress-bar');
    const btnBack = document.getElementById('btn-back');
    const btnNext = document.getElementById('btn-next');
    const btnReset = document.getElementById('btn-reset');
    const finalState = document.getElementById('final-state');
    const pitchForm = document.getElementById('pitch-form');
    const promptOutput = document.getElementById('prompt-output');

    function renderStep() {
      const step = STEPS[currentStep];
      progressBar.style.width = `${((currentStep + 1) / STEPS.length) * 100}%`;
      
      stepContainer.innerHTML = `
        <div class="space-y-3 animate-fade-in">
          <label class="block text-sm font-medium text-gray-900">${step.label}</label>
          <p class="text-xs text-gray-500">${step.guide}</p>
          <textarea 
            id="input-${step.id}"
            class="w-full p-3 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-gray-200 focus:border-gray-400 outline-none transition resize-none h-24"
            placeholder="${step.placeholder}"
          >${formData[step.id] || ''}</textarea>
        </div>
      `;

      btnBack.classList.toggle('hidden', currentStep === 0);
      btnNext.textContent = currentStep === STEPS.length - 1 ? '✨ Generar Prompt' : 'Siguiente →';
    }

    function saveStep() {
      const step = STEPS[currentStep];
      const input = document.getElementById(`input-${step.id}`);
      if (input) formData[step.id] = input.value.trim();
      localStorage.setItem('saluddrive_pitch_draft', JSON.stringify(formData));
    }

    function nextStep() {
      saveStep();
      if (currentStep < STEPS.length - 1) {
        currentStep++;
        renderStep();
      } else {
        generatePrompt();
      }
    }

    function prevStep() {
      saveStep();
      if (currentStep > 0) {
        currentStep--;
        renderStep();
      }
    }

    function generatePrompt() {
      pitchForm.classList.add('hidden');
      finalState.classList.remove('hidden');
      
      const prompt = `Actúa como experto en gestión de producto y metodologías ShapeUp. Genera un pitch ejecutivo interno para C-Level y líderes.

CONTEXTO:
- Nombre: ${formData.name || '[PENDIENTE]'}
- Appetite: ${formData.appetite || '[PENDIENTE]'}
- Problema: ${formData.problem || '[PENDIENTE]'}
- Solución: ${formData.solution || '[PENDIENTE]'}
- Rabbit Holes: ${formData.rabbit_holes || '[PENDIENTE]'}
- No-Gos: ${formData.no_gos || '[PENDIENTE]'}

INSTRUCCIONES:
1. Formato: Markdown limpio, profesional, sin adornos.
2. Estructura: Resumen Ejecutivo (3 líneas) → Problema → Solución → Matriz de Riesgos (Rabbit Holes) → Alcance Delimitado (No-Gos) → Recomendación de Apuesta.
3. Tono: Estratégico, directo, orientado a ROI operativo y mitigación de riesgos.
4. No inventes datos. Si falta info, marca [PENDIENTE].
5. Finaliza con: ✅ Apostar | ⚠️ Investigar más | ❌ Descartar (con 1 línea de justificación).

Genera el pitch ahora.`;

      promptOutput.value = prompt;
    }

    function copyPrompt() {
      promptOutput.select();
      document.execCommand('copy');
      const btn = document.querySelector('#final-state button');
      const original = btn.textContent;
      btn.textContent = '✅ Copiado';
      setTimeout(() => btn.textContent = original, 2000);
    }

    function restartWizard() {
      localStorage.removeItem('saluddrive_pitch_draft');
      currentStep = 0;
      Object.keys(formData).forEach(k => delete formData[k]);
      finalState.classList.add('hidden');
      pitchForm.classList.remove('hidden');
      renderStep();
    }

    // Event Listeners
    btnNext.addEventListener('click', nextStep);
    btnBack.addEventListener('click', prevStep);
    btnReset.addEventListener('click', restartWizard);
    document.addEventListener('keydown', e => { if (e.key === 'Escape') restartWizard(); });

    // Init
    renderStep();
  </script>  </body></html>
